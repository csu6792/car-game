 <!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>賽車小遊戲-亡命飆速 </title>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>

        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3a, #050510); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; color: white; text-align: center; overflow-y: auto; padding: 20px 0; }

        .title { font-size: 56px; font-weight: 900; letter-spacing: 6px; color: #fff; text-shadow: 0 0 30px #007bff; margin-bottom: 5px; }

        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; animation: blink 1.2s infinite; font-size: 18px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .setting-group { margin: 8px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; width: 440px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }

        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }

        .option-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

        .opt-btn { padding: 10px 14px; border: 1px solid #007bff; background: rgba(0, 123, 255, 0.1); color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 12px; }

        .opt-btn.active { background: #007bff; box-shadow: 0 0 20px #007bff; border-color: #00ffcc; }

        .start-btn { padding: 18px 70px; font-size: 24px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: 900; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,123,255,0.4); }

        #ui-layer { position: absolute; top: 25px; left: 25px; right: 25px; pointer-events: none; z-index: 2000; display: none; }

        #scoreDisplay { font-size: 42px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #000; }

        #speedo { color: #fff; font-size: 22px; font-weight: bold; clear: both; float: right; margin-top: 10px; font-family: monospace; text-shadow: 0 0 10px #000; }

        #hp-container { width: 220px; height: 20px; background: #222; border: 2px solid #fff; border-radius: 12px; overflow: hidden; margin-bottom: 10px; display: none; }

        #hp-bar { width: 100%; height: 100%; background: linear-gradient(to right, #ff0000, #ff6666); transition: 0.3s; }

        #remote-info { margin-top: 10px; font-size: 14px; color: #00ffcc; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 10px; display: none; border: 1px solid #00ffcc; }

        #controller-ui { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align: center; }

        #touch-controller { position: absolute; top:0; left:0; width:100%; height:100%; display:none; z-index: 10; width: 100%; }

        .touch-btn { width: 50%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 50px; font-weight: 900; }

    </style>

</head>

<body>

    <audio id="bgm" loop preload="auto"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <audio id="crashSound" preload="auto"><source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg"></audio>



    <div id="controller-ui">

        <div id="setup-area">

            <h2>遠端遙控器</h2>

            <input type="text" id="peer-id-input" placeholder="電腦 ID" maxlength="4" style="padding:15px; font-size:20px; text-align:center; border-radius:10px; margin-bottom:20px;">

            <br>

            <button class="opt-btn active" style="font-size:20px; padding:15px 50px;" onclick="connectToPC()">連線</button>

        </div>

        <div id="touch-controller">

            <div class="touch-btn" style="background:rgba(255,0,0,0.1);" onpointerdown="sendRemoteCmd('L')">◀</div>

            <div class="touch-btn" style="background:rgba(0,255,0,0.1);" onpointerdown="sendRemoteCmd('R')">▶</div>

        </div>

        <!-- 💡 動態提示文字 -->

        <p id="remote-hint" style="display:none; color:#00ffcc; font-size:20px; margin-top:30px;">✅ 連線成功！</p>

    </div>



    <div id="start-screen">

        <div class="title">亡命飆速</div>

        <div class="warning-text">🚨 警告：盡全力逃避警方，小心車輛！</div>

        

        <div class="setting-group">

            <div class="setting-label">🕹️ 操控設定</div>

            <div class="option-group">

                <button id="ctrl-touch" class="opt-btn active" onclick="updateSetting('ctrl', 'touch')">鍵盤/觸控</button>

                <button id="ctrl-tilt" class="opt-btn" onclick="updateSetting('ctrl', 'tilt')">手機體感</button>

                <button id="ctrl-remTilt" class="opt-btn" onclick="updateSetting('ctrl', 'remTilt')">遙控(體感)</button>

                <button id="ctrl-remTouch" class="opt-btn" onclick="updateSetting('ctrl', 'remTouch')">遙控(觸控)</button>

                <button id="ctrl-as-remote" class="opt-btn" style="border-color:#ff9900" onclick="setupAsController()">遠端遙控器</button>

            </div>

            <div id="remote-info">電腦 ID: <span id="my-id" style="color:#fff; font-weight:bold; font-size:20px;">...</span></div>

        </div>



        <div class="setting-group">

            <div class="setting-label">🛡️ 挑戰難度</div>

            <div class="option-group">

                <button id="diff-1" class="opt-btn active" onclick="updateSetting('diff', 1)">簡單</button>

                <button id="diff-2" class="opt-btn" onclick="updateSetting('diff', 2)">普通</button>

                <button id="diff-3" class="opt-btn" onclick="updateSetting('diff', 3)">困難</button>

            </div>

        </div>



        <div class="setting-group">

            <div class="setting-label">🔥 遊戲模式</div>

            <div class="option-group">

                <button id="mode-hard" class="opt-btn active" onclick="updateSetting('mode', 'hard')">💀 一撞即死</button>

                <button id="mode-easy" class="opt-btn" onclick="updateSetting('mode', 'easy')">❤️ 護甲模式</button>

            </div>

        </div>



        <button id="start-btn" class="start-btn" onclick="handleStart()">進入賽道</button>

    </div>



    <div id="ui-layer">

        <div id="hp-container"><div id="hp-bar"></div></div>

        <div id="scoreDisplay">00000</div>

        <div id="speedo">0 KM/H</div>

    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>



    <script>

        let scene, camera, renderer, car, streetLightModel = null, obsCarModels = {}, decorPool = { 0: [], 1: [], 2: [], 3: [] };

        let gameStarted = false, score = 0, currentSpeed = 1.0, hp = 100;

        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        let obstacles = [], decor = [], settings = { ctrl: 'touch', mode: 'hard', diff: 1 };

        let policeLightR, policeLightB, peer = null, activeConn = null;

        let client = null;
        let topic = "";
        let roomID = "";
        let isPC = false;


        function updateSetting(type, val) {

            settings[type] = val;

            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));

            document.getElementById(`${type}-${val}`).classList.add('active');

            const isRemote = (val === 'remTilt' || val === 'remTouch');

            document.getElementById('remote-info').style.display = isRemote ? 'block' : 'none';

            if (isRemote) initMQTTasPC();

        }



        function setupAsController() { document.getElementById('controller-ui').style.display = 'flex'; }



		function initMQTTasPC() {
			if (client) return;

			isPC = true;

			// 產生 4 位數房間
			roomID = Math.floor(1000 + Math.random() * 8999).toString();
			topic = "racing-game/" + roomID;

			document.getElementById('my-id').innerText = roomID;

			client = mqtt.connect("wss://mqttgo.io:8084/mqtt")
			  

			client.on("connect", () => {
				console.log("✅ PC 已連線 MQTT");
				client.subscribe(topic);
				setInterval(() => {
					if (!gameStarted) { // 遊戲開始前持續廣播模式設定
						client.publish(topic, JSON.stringify({ 
							type: 'mode', 
							value: settings.ctrl 
						}));
					}
				}, 2000);
			});

			client.on("message", (t, msg) => {
				const data = JSON.parse(msg.toString());
				
				if (data.type === "join" || data.type === "tilt" || data.type === "touch") {
					const idDisplay = document.getElementById('my-id');
					idDisplay.innerText = "✅ 手機已連線";
					idDisplay.style.color = "#00ffcc";
				}

				if (data.type === "tilt" && settings.ctrl === "remTilt") {
					handleTilt(data.value);
				}

				if (data.type === "touch" && settings.ctrl === "remTouch") {
					if (data.value === "L") moveLane(-1);
					else moveLane(1);
				}
			});

			client.on("error", err => {
				console.error("MQTT error:", err);
			});
		}



		async function connectToPC() {
			roomID = document.getElementById('peer-id-input').value;
			if (!roomID) { alert("請輸入房間ID"); return; }

			topic = "racing-game/" + roomID;

		
			if (typeof DeviceOrientationEvent !== 'undefined' &&
				typeof DeviceOrientationEvent.requestPermission === 'function') {
				try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
			}

			client = mqtt.connect("wss://mqttgo.io:8084/mqtt")

			client.on("connect", () => {
				console.log("📱 手機已連線 MQTT");
				client.subscribe(topic);
				document.getElementById('setup-area').style.display = 'none';
				document.getElementById('remote-hint').style.display = 'block';
				document.getElementById('remote-hint').innerText = "⏳ 等待 PC 確認模式...";
				client.publish(topic, JSON.stringify({ type: "join", value: "mobile_ready" }));
			});

			client.on("message", (t, msg) => {
				const data = JSON.parse(msg.toString());

			
				if (data.type === 'mode') {
					const hint = document.getElementById('remote-hint');
					
					if (data.value === 'remTilt') {
						hint.innerHTML = "✅ 體感模式<br>請傾斜手機控制";
						document.getElementById('touch-controller').style.display = 'none';
						
				
						window.addEventListener('deviceorientation', sendTiltData);
					} else if (data.value === 'remTouch') {
						hint.innerHTML = "✅ 觸控模式<br>請點擊左右按鈕";
						document.getElementById('touch-controller').style.display = 'flex';
						
				
						window.removeEventListener('deviceorientation', sendTiltData);
					}
				}
				
				if (data.type === 'game_over') {
					// 做法 A：直接重新整理頁面（最乾淨，回到輸入 ID 的畫面）
					alert("遊戲已結束，點擊確定回到主畫面");
					location.reload(); 

					/* 
					// 做法 B：不重新整理，只切換 UI（如果你不想重新輸入 ID）
					document.getElementById('remote-hint').style.display = 'none';
					document.getElementById('touch-controller').style.display = 'none';
					document.getElementById('setup-area').style.display = 'block'; // 顯示連線輸入框
					window.removeEventListener('deviceorientation', sendTiltData); 
					*/
				}
			});
		}


		function sendTiltData(e) {
			const now = Date.now();
			if (now - lastSend < 50) return; 
			lastSend = now;
			smooth = smooth * 0.8 + e.gamma * 0.2;
			
			client.publish(topic, JSON.stringify({
				type: "tilt",
				value: smooth
			}), { qos: 0 });
		}


       function sendRemoteCmd(side) {
			if (!client) return;

			client.publish(topic, JSON.stringify({
				type: "touch",
				value: side
			}), { qos: 1 });
		}

        function moveLane(dir) { currentLaneIndex = Math.max(0, Math.min(2, currentLaneIndex + dir)); targetX = lanes[currentLaneIndex]; }

        function handleTilt(tilt) { if (tilt < -12) currentLaneIndex = 0; else if (tilt > 12) currentLaneIndex = 2; else currentLaneIndex = 1; targetX = lanes[currentLaneIndex]; }



        function init3D() {

            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);

            scene.fog = new THREE.Fog(0x87CEEB, 40, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });

            renderer.setSize(window.innerWidth, window.innerHeight);

            renderer.outputEncoding = THREE.sRGBEncoding;

            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.4));

            const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(10, 50, 10); scene.add(sun);

            road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x333333 }));

            road.rotation.x = -Math.PI / 2; scene.add(road);

            grassPlane = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));

            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.15; scene.add(grassPlane);



            // 💡 爆閃燈初始化

            policeLightR = new THREE.PointLight(0xff0000, 0, 50); policeLightB = new THREE.PointLight(0x0000ff, 0, 50);

            scene.add(policeLightR, policeLightB);

            

            const loader = new THREE.GLTFLoader();

            loader.load('car.glb', (g) => { car = g.scene; car.scale.set(4.5, 4.5, 4.5); scene.add(car); car.position.z = 15; });

            loader.load('nintendogs_street_light.glb', (g) => { streetLightModel = g.scene; });

            ['car1.glb','car2.glb','car3.glb','car4.glb','car5.glb','car6.glb'].forEach(f => { loader.load(f, (g) => { obsCarModels[f] = g.scene; }); });

            const loadTree = (f, idxs) => { loader.load(f, (g) => { g.scene.traverse(n => { if(n.isMesh) idxs.forEach(i => decorPool[i].push(n.clone())); }); }); };

            loadTree('birch_trees_pack__ps1_low_poly.glb', [0, 1]); loadTree('pine_trees_pack__ps1_low_poly.glb', [2]); loadTree('snowy_pine_trees_pack__ps1_low_poly.glb', [3]);



            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);

            renderer.setAnimationLoop(() => { if(gameStarted) animate(); renderer.render(scene, camera); });

        }



        async function handleStart() {

            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {

                try { await DeviceOrientationEvent.requestPermission(); } catch(e){}

            }

            document.getElementById('start-screen').style.display = 'none';

            document.getElementById('ui-layer').style.display = 'block';

            if (settings.mode === 'easy') { document.getElementById('hp-container').style.display = 'block'; hp = 100; updateHPBar(); }

            document.getElementById('bgm').play().catch(()=>{});

            gameStarted = true;

            

            const startSpeeds = [0, 1.8, 2.5, 3.0]; 

            const accelRates = [0, 0.003, 0.006, 0.009]; 

            currentSpeed = startSpeeds[settings.diff];



            setInterval(() => { if(gameStarted) { score++; currentSpeed += accelRates[settings.diff]; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); document.getElementById('speedo').innerText = Math.floor(currentSpeed * 50) + " KM/H"; updateSeasons(); } }, 100);

            setInterval(createObstacle, [0, 1000, 700, 450][settings.diff]);

            setInterval(createPairs, 500);

            initControls();

        }



        function updateHPBar() { document.getElementById('hp-bar').style.width = hp + "%"; }

        function endGame() { gameStarted = false; if (client && client.connected) {client.publish(topic, JSON.stringify({ type: "game_over" }));} setTimeout(() => { alert("💥 Game Over！得分: " + score); location.reload(); }, 100); }



        function createObstacle() {

            const keys = Object.keys(obsCarModels); if (!gameStarted || keys.length === 0) return;

            let k = keys[Math.floor(Math.random() * keys.length)];

            let c = obsCarModels[k].clone();

            c.scale.set(3.2, 3.2, 3.2); c.rotation.y = Math.PI / 2;

            c.position.set(lanes[Math.floor(Math.random() * 3)], 0, -180);

            scene.add(c); obstacles.push(c);

        }



        function createPairs() {

            if (!gameStarted || !streetLightModel) return;

            const idx = Math.floor(score / 200) % 4;

            if (score % 25 === 0) {

                [-1, 1].forEach(side => {

                    let s = streetLightModel.clone(); s.scale.set(0.4, 0.4, 0.4); 

                    s.position.set(side * 9.5, 0, -220); s.rotation.y = side > 0 ? 0 : Math.PI;

                    scene.add(s); decor.push(s);

                });

            } else if (decorPool[idx] && decorPool[idx].length > 0 && score % 15 === 0) {

                const treeBase = decorPool[idx][Math.floor(Math.random() * decorPool[idx].length)];

                [-1, 1].forEach(side => {

                    let t = treeBase.clone(); t.scale.set(0.18, 0.18, 0.18);

                    t.position.set(side * 14.5, 0, -220); scene.add(t); decor.push(t);

                });

            }

        }



        function animate() {

            if(car) { 

                car.position.x += (targetX - car.position.x) * 0.15; 

                car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; 

                // 💡 爆閃燈閃爍邏輯修復

                let flash = (Math.floor(Date.now() / 150) % 2);

                policeLightR.intensity = flash === 0 ? 80 : 0; 

                policeLightB.intensity = flash === 1 ? 80 : 0;

                policeLightR.position.set(car.position.x - 0.7, 4.5, car.position.z);

                policeLightB.position.set(car.position.x + 0.7, 4.5, car.position.z);

            }

            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});

            obstacles.forEach((obs, i) => {

                obs.position.z += currentSpeed;

                if (car && Math.abs(car.position.z - obs.position.z) < 2.0 && Math.abs(car.position.x - obs.position.x) < 1.5) {

                    document.getElementById('crashSound').play();

                    if (settings.mode === 'easy') { hp -= 34; updateHPBar(); scene.remove(obs); obstacles.splice(i, 1); if (hp <= 0) endGame(); } else endGame();

                }

                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }

            });

        }



        function updateSeasons() {

            const idx = Math.floor(score / 200) % 4;

            const sky = [0x87CEEB, 0x00BFFF, 0xFFA500, 0xE0F7FA], grass = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];

            if(scene) { scene.background.setHex(sky[idx]); scene.fog.color.setHex(sky[idx]); grassPlane.material.color.setHex(grass[idx]); }

        }


      let lastSend = 0;
      let smooth = 0;




        function initControls() {

            window.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') moveLane(-1); if (e.key === 'ArrowRight') moveLane(1); });

            window.addEventListener('touchstart', e => { if (!gameStarted || settings.ctrl !== 'touch') return; if (e.touches[0].clientX < window.innerWidth / 2) moveLane(-1); else moveLane(1); });

			window.addEventListener("deviceorientation", e => {
				if (!client) return;

				const now = Date.now();
				if (now - lastSend < 50) return; // 限制頻率（20fps）
				lastSend = now;

				smooth = smooth * 0.8 + e.gamma * 0.2;

				client.publish(topic, JSON.stringify({
					type: "tilt",
					value: smooth
				}), { qos: 0 });
			});

        }

        window.onload = init3D;

    </script>

</body>

</html>
